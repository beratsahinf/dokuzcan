<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚠ ACİL TIBBİ BİLGİ — DOKUZCAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #E8001D;
      --dark-red: #9B0013;
      --black: #080808;
      --dark: #111;
      --panel: #161616;
      --border: #2a2a2a;
      --white: #F2F0EC;
      --grey: #888;
      --light-grey: #bbb;
      --green: #22c55e;
      --yellow: #f59e0b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050505;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }
    .phone-wrapper {
      width: 100%;
      max-width: 420px;
      background: var(--black);
      min-height: 100vh;
    }
    @media (min-width: 480px) {
      body { padding: 32px 16px; }
      .phone-wrapper {
        min-height: auto;
        box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 0 1px #222;
        border-radius: 12px;
        overflow: hidden;
      }
    }

    /* ALERT BANNER */
    .alert-banner {
      background: var(--red);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      position: relative; overflow: hidden;
      animation: pulse-bg 2s ease-in-out infinite;
    }
    .alert-banner::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      animation: sweep 3s ease-in-out infinite;
    }
    @keyframes sweep { 0%{left:-100%} 100%{left:200%} }
    @keyframes pulse-bg { 0%,100%{background:#E8001D} 50%{background:#c5001a} }
    .alert-icon { font-size: 18px; animation: blink 1s step-end infinite; position: relative; z-index:1; }
    @keyframes blink { 50%{opacity:0} }
    .alert-text { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:4px; color:white; position:relative; z-index:1; }

    /* SCAN STRIP */
    .scan-strip {
      background:#000; border-bottom:1px solid var(--border);
      padding:8px 16px;
      display:flex; justify-content:space-between; align-items:center;
      font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; color:var(--grey);
    }
    .scan-live { display:flex; align-items:center; gap:6px; color:var(--green); }
    .scan-dot { width:6px;height:6px;border-radius:50%;background:var(--green); animation:dpulse 1.5s infinite; }
    @keyframes dpulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* HEADER */
    .profile-header {
      background:#0d0404;
      border-bottom:2px solid var(--red);
      padding:28px 24px 24px;
      text-align:center;
    }
    .brand-tag { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:5px; text-transform:uppercase; color:rgba(232,0,29,0.6); margin-bottom:14px; }
    .profile-avatar-row { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:10px; }
    .profile-avatar {
      width:56px;height:56px;background:var(--red);
      display:flex;align-items:center;justify-content:center;
      font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:white;
      flex-shrink:0;
    }
    .profile-name { font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:3px; color:var(--white); line-height:1; text-align:left; }
    .profile-id { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--grey); margin-top:6px; }

    /* CRITICAL 3'LÜ */
    .critical-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px; background:var(--border); }
    .critical-card { background:var(--panel); padding:18px 10px; text-align:center; position:relative; }
    .critical-card.blood::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--red); }
    .critical-label { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--grey); margin-bottom:6px; }
    .critical-value { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:2px; color:var(--white); line-height:1; }
    .critical-value.red { color:var(--red); }
    .critical-unit { font-size:12px; color:#555; }

    /* DANGER FLAG */
    .danger-flag {
      background:rgba(232,0,29,0.07); border:1px solid rgba(232,0,29,0.25); border-left:3px solid var(--red);
      margin:10px 14px; padding:13px 14px;
      display:flex; align-items:flex-start; gap:10px;
    }
    .danger-flag-title { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--red); margin-bottom:3px; }
    .danger-flag-val { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:600; color:var(--white); }

    /* ACİL ARA */
    .call-btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      background:var(--red); color:white; text-decoration:none;
      padding:18px; margin:10px 14px 0;
      font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:4px;
      position:relative; overflow:hidden; transition:background 0.2s;
    }
    .call-btn::before {
      content:''; position:absolute; top:0;left:-100%;width:60%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
      animation:sweep 2s ease-in-out infinite;
    }
    .call-btn > * { position:relative;z-index:1; }
    .call-btn:active { background:var(--dark-red); }

    /* INFO SECTION */
    .section { margin:14px 14px 0; }
    .section-title { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:var(--grey); padding-bottom:8px; border-bottom:1px solid var(--border); margin-bottom:2px; }
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid #1a1a1a; }
    .info-row:last-child { border-bottom:none; }
    .info-key { font-family:'Barlow Condensed',sans-serif; font-size:13px; color:var(--grey); }
    .info-val { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:600; color:var(--white); text-align:right; max-width:60%; }
    .info-val.red { color:var(--red); }
    .info-val.green { color:var(--green); }
    .badge { display:inline-block; padding:2px 8px; font-size:10px; font-weight:700; letter-spacing:2px; }
    .badge-green { background:rgba(34,197,94,0.12); color:var(--green); border:1px solid rgba(34,197,94,0.25); }
    .badge-red { background:rgba(232,0,29,0.12); color:var(--red); border:1px solid rgba(232,0,29,0.25); }

    /* ACİL KİŞİ */
    .emergency-block { margin:14px 14px 0; background:var(--panel); border:1px solid var(--red); overflow:hidden; }
    .emergency-head { background:var(--red); padding:9px 14px; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:3px; color:white; }
    .contact-item { padding:14px; border-bottom:1px solid var(--border); }
    .contact-item:last-child { border-bottom:none; }
    .contact-relation { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--red); margin-bottom:3px; }
    .contact-name { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--white); margin-bottom:3px; }
    .contact-phone { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:600; color:var(--white); text-decoration:none; display:flex; align-items:center; gap:6px; }

    /* NOTLAR */
    .notes-box { margin:14px 14px 0; background:rgba(245,158,11,0.04); border:1px solid rgba(245,158,11,0.15); border-left:3px solid var(--yellow); padding:13px 14px; }
    .notes-title { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--yellow); margin-bottom:6px; }
    .notes-text { font-size:14px; line-height:1.7; color:#aaa; }

    /* ACTIONS */
    .actions { margin:14px; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .action-btn {
      background:var(--panel); border:1px solid var(--border); padding:13px 10px;
      text-align:center; text-decoration:none; color:var(--white);
      font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
      transition:all 0.2s; cursor:pointer; display:block;
    }
    .action-btn:hover { border-color:var(--red); color:var(--red); }
    .action-icon { display:block; font-size:18px; margin-bottom:4px; }

    /* FOOTER */
    .qr-footer { margin:14px; padding-top:16px; text-align:center; border-top:1px solid var(--border); padding-bottom:24px; }
    .qr-footer-brand { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:4px; color:#444; margin-bottom:4px; }
    .qr-footer-brand span { color:var(--red); }
    .qr-footer-info { font-family:'JetBrains Mono',monospace; font-size:10px; color:#333; margin-top:3px; }

    /* LOADING / ERROR */
    .state-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 24px; flex-direction:column; text-align:center; gap:16px; }
    .state-icon { font-size:48px; }
    .state-title { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; color:var(--red); }
    .state-msg { font-family:'Barlow Condensed',sans-serif; font-size:14px; color:var(--grey); line-height:1.6; }
    .spinner { width:32px;height:32px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

  <!-- İçerik JS tarafından doldurulacak -->
  <div class="phone-wrapper" id="app">
    <div class="state-screen">
      <div class="spinner"></div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--grey);">Profil yükleniyor...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://fascsdkzcmnmaaxvldxf.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhc2NzZGt6Y21ubWFheHZsZHhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTMxMTMsImV4cCI6MjA5MzM4OTExM30.Unlfg8DHP7ce2CtFCcCgRaydstrCB-dwAIEebFRUQm4'
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    function showError(title, msg) {
      document.getElementById('app').innerHTML = `
        <div class="state-screen">
          <div class="state-icon">⚠️</div>
          <div class="state-title">${title}</div>
          <div class="state-msg">${msg}</div>
        </div>`
    }

    function fmt(v, fallback = '—') { return v && v.trim() ? v.trim() : fallback }
    function calcAge(dateStr) {
      if (!dateStr) return '—'
      return Math.floor((Date.now() - new Date(dateStr)) / (365.25 * 864e5)) + ''
    }

    async function loadProfile() {
      const params = new URLSearchParams(window.location.search)
      const slug = params.get('slug')

      if (!slug || slug === 'unknown') {
        showError('GEÇERSİZ QR', 'Bu QR koda ait profil bulunamadı.')
        return
      }

      // 1. Slug ile kit bul
      const { data: kit, error: kitErr } = await sb
        .from('kits')
        .select('user_id, slug, kit_type, is_active')
        .eq('slug', slug)
        .maybeSingle()

      if (kitErr) {
        showError('VERİTABANI HATASI', kitErr.message + ' — RLS policy eksik olabilir.')
        return
      }
      if (!kit) {
        showError('PROFİL BULUNAMADI', 'Slug: ' + slug + ' — Bu QR koda kayıtlı profil yok.')
        return
      }
      if (kit.is_active === false) {
        showError('PROFİL PASİF', 'Profil sahibi bu QR kodu geçici olarak devre dışı bırakmış.')
        return
      }

      // 2. Profil bilgileri
      const { data: profile, error: profErr } = await sb
        .from('profiles')
        .select('first_name, last_name')
        .eq('id', kit.user_id)
        .maybeSingle()

      if (profErr) {
        showError('PROFİL HATASI', 'profiles tablosu anonim okuma izni yok. SQL güncellenmeli.')
        return
      }

      // 3. Tıbbi veri
      const { data: med, error: medErr } = await sb
        .from('medical_data')
        .select('*')
        .eq('user_id', kit.user_id)
        .maybeSingle()

      if (medErr) {
        // Tıbbi veri yok ama profil var — yine de göster
        console.warn('medical_data hatası:', medErr.message)
      }

      // 4. DOM'u doldur
      renderProfile(slug, profile, med)
    }

    function renderProfile(slug, profile, med) {
      const firstName = profile?.first_name?.toUpperCase() || ''
      const lastName  = profile?.last_name?.toUpperCase() || ''
      const displayName = (firstName + ' ' + lastName).trim() || 'PROFİL'
      const initials = firstName && lastName
        ? (profile.first_name[0] + profile.last_name[0]).toUpperCase()
        : slug.slice(3, 5)

      const bloodType = med?.blood_type || '—'
      const age = calcAge(med?.birth_date)
      const weight = med?.weight ? med.weight + '<span class="critical-unit">KG</span>' : '—'
      const allergies = med?.allergies ? med.allergies.split(',').filter(Boolean) : []
      const foodAllergies = med?.food_allergies ? med.food_allergies.split(',').filter(Boolean) : []
      const medications = med?.medications ? med.medications.split(',').filter(Boolean) : []
      const bloodThinner = med?.blood_thinner === 'yes'
      const scanTime = new Date().toLocaleString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
      const updateDate = med?.updated_at ? new Date(med.updated_at).toLocaleDateString('tr-TR') : '—'

      document.getElementById('app').innerHTML = `
        <!-- ALERT -->
        <div class="alert-banner">
          <span class="alert-icon">🚨</span>
          <span class="alert-text">ACİL TIBBİ BİLGİ</span>
          <span class="alert-icon">🚨</span>
        </div>

        <!-- SCAN STRIP -->
        <div class="scan-strip">
          <span class="scan-live"><span class="scan-dot"></span>PROFİL AKTİF</span>
          <span>QR: ${scanTime}</span>
        </div>

        <!-- HEADER -->
        <div class="profile-header">
          <div class="brand-tag">Dokuzcan · Acil Tıbbi Profil</div>
          <div class="profile-avatar-row">
            <div class="profile-avatar">${initials}</div>
            <div class="profile-name">${displayName}</div>
          </div>
          <div class="profile-id">ID: ${slug}</div>
        </div>

        <!-- KRİTİK 3'LÜ -->
        <div class="critical-grid">
          <div class="critical-card blood">
            <div class="critical-label">Kan Grubu</div>
            <div class="critical-value red">${bloodType}</div>
          </div>
          <div class="critical-card">
            <div class="critical-label">Yaş</div>
            <div class="critical-value">${age}</div>
          </div>
          <div class="critical-card">
            <div class="critical-label">Kilo</div>
            <div class="critical-value">${weight}</div>
          </div>
        </div>

        <!-- ALERJİ FLAG -->
        ${allergies.length > 0 ? `
        <div class="danger-flag">
          <div>
            <div class="danger-flag-title">⚠ İlaç Alerjisi — KRİTİK</div>
            <div class="danger-flag-val">${allergies.join(', ')}</div>
          </div>
        </div>` : ''}

        ${bloodThinner ? `
        <div class="danger-flag">
          <div>
            <div class="danger-flag-title">⚠ Kan Sulandırıcı Kullanıyor</div>
            <div class="danger-flag-val">Kanama riski artmış — dikkatli müdahale</div>
          </div>
        </div>` : ''}

        <!-- ACİL ARA -->
        ${med?.emergency_contact_phone ? `
        <a href="tel:${med.emergency_contact_phone}" class="call-btn">
          <span>📞</span><span>ACİL KİŞİYİ ARA${med.emergency_contact_name ? ' — ' + med.emergency_contact_name : ''}</span>
        </a>` : ''}

        <!-- TIBBİ BİLGİLER -->
        <div class="section" style="margin-top:18px;">
          <div class="section-title">Tıbbi Bilgiler</div>
          <div class="info-row">
            <span class="info-key">Kronik Hastalık</span>
            <span class="info-val">${fmt(med?.chronic_conditions, 'Yok')}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Sürekli İlaç</span>
            <span class="info-val">${medications.length ? medications.join(', ') : 'Yok'}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Besin Alerjisi</span>
            <span class="info-val ${foodAllergies.length ? 'red' : 'green'}">${foodAllergies.length ? foodAllergies.join(', ') : 'Yok'}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Kan Sulandırıcı</span>
            <span class="info-val ${bloodThinner ? 'red' : 'green'}">${bloodThinner ? 'KULLANIYOR' : 'Hayır'}</span>
          </div>
          ${med?.insurance_company ? `
          <div class="info-row">
            <span class="info-key">Sigorta</span>
            <span class="info-val">${med.insurance_company}</span>
          </div>` : ''}
          ${med?.insurance_policy ? `
          <div class="info-row">
            <span class="info-key">Poliçe No</span>
            <span class="info-val" style="font-family:'JetBrains Mono',monospace;font-size:12px;">${med.insurance_policy}</span>
          </div>` : ''}
        </div>

        <!-- ACİL KİŞİ -->
        ${med?.emergency_contact_name ? `
        <div class="emergency-block">
          <div class="emergency-head">📞 Acil İletişim</div>
          <div class="contact-item">
            <div class="contact-relation">${fmt(med.emergency_contact_relation, 'Yakın')}</div>
            <div class="contact-name">${med.emergency_contact_name}</div>
            <a href="tel:${med.emergency_contact_phone || ''}" class="contact-phone">📱 ${fmt(med.emergency_contact_phone)}</a>
          </div>
        </div>` : ''}

        <!-- NOTLAR -->
        ${med?.notes ? `
        <div class="notes-box">
          <div class="notes-title">⚠ Ek Tıbbi Notlar</div>
          <div class="notes-text">${med.notes}</div>
        </div>` : ''}

        <!-- AKSIYONLAR -->
        <div class="actions">
          <a href="tel:112" class="action-btn">
            <span class="action-icon">🚑</span>112 Ara
          </a>
          <button class="action-btn" onclick="copyInfo()">
            <span class="action-icon">📋</span>Bilgileri Kopyala
          </button>
        </div>

        <!-- FOOTER -->
        <div class="qr-footer">
          <div class="qr-footer-brand">DOKU<span>ZCAN</span></div>
          <div class="qr-footer-info">Profil güncelleme: ${updateDate}</div>
        </div>
      `

      // Kopyalama fonksiyonu için global değişkenleri kaydet
      window._qrProfile = { profile, med, slug }
    }

    function copyInfo() {
      const { profile, med, slug } = window._qrProfile || {}
      const name = profile ? profile.first_name + ' ' + profile.last_name : '—'
      const lines = [
        'ACİL TIBBİ BİLGİ — DOKUZCAN',
        'Ad Soyad: ' + name,
        'Kan Grubu: ' + (med?.blood_type || '—'),
        'Yaş: ' + calcAge(med?.birth_date),
        'Kilo: ' + (med?.weight ? med.weight + 'kg' : '—'),
        'Alerji (İlaç): ' + (med?.allergies || 'Yok'),
        'Alerji (Besin): ' + (med?.food_allergies || 'Yok'),
        'Kronik: ' + (med?.chronic_conditions || 'Yok'),
        'İlaçlar: ' + (med?.medications || 'Yok'),
        'Kan Sulandırıcı: ' + (med?.blood_thinner === 'yes' ? 'EVET' : 'Hayır'),
        'Acil Kişi: ' + (med?.emergency_contact_name || '—') + ' ' + (med?.emergency_contact_phone || ''),
        'Not: ' + (med?.notes || '—'),
        'Profil ID: ' + slug,
      ]
      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        const btn = event.currentTarget
        const orig = btn.innerHTML
        btn.innerHTML = '<span class="action-icon">✓</span>Kopyalandı'
        btn.style.borderColor = 'var(--green)'; btn.style.color = 'var(--green)'
        setTimeout(() => { btn.innerHTML = orig; btn.style.borderColor = ''; btn.style.color = '' }, 2500)
      })
    }

    loadProfile()
  </script>
</body>
</html>
