<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ödeme — DOKUZCAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808;
      color: #F2F0EC;
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .topbar {
      width: 100%;
      background: rgba(8,8,8,0.97);
      border-bottom: 1px solid #252525;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 4px;
      color: #F2F0EC;
      text-decoration: none;
    }
    .logo span { color: #E8001D; }
    .back {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #777;
      text-decoration: none;
    }
    .back:hover { color: #F2F0EC; }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 32px 16px 60px;
      flex: 1;
    }

    .section-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #E8001D;
      margin-bottom: 8px;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 48px 0;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid #252525;
      border-top-color: #E8001D;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #555;
    }

    .error-box {
      background: rgba(232,0,29,0.08);
      border: 1px solid rgba(232,0,29,0.3);
      border-left: 3px solid #E8001D;
      padding: 16px;
      font-size: 14px;
      color: #E8001D;
      margin-bottom: 20px;
    }
    .btn-back {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 24px;
      background: #E8001D;
      color: #000;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
    }

    /* iyzico form override — mobil uyumlu */
    #iyzipay-checkout-form {
      width: 100% !important;
    }
    #iyzipay-checkout-form iframe {
      width: 100% !important;
      max-width: 100% !important;
    }

    .trust-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .trust-item {
      font-size: 11px;
      letter-spacing: 1px;
      color: #444;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="logo">DOKUZ<span>CAN</span></a>
    <a href="/urun" class="back">← Geri</a>
  </div>

  <div class="container">
    <div class="section-tag">Güvenli Ödeme</div>
    <div class="section-title">ÖDEMEYİ TAMAMLA</div>

    <div id="errorBox" class="error-box" style="display:none;">
      Ödeme formu yüklenemedi.
      <br><a href="/urun" class="btn-back">Geri Dön</a>
    </div>

    <div id="loadingBox" class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Ödeme formu hazırlanıyor...</div>
    </div>

    <!-- iyzico formu buraya yüklenir -->
    <div id="checkoutContainer"></div>

    <div class="trust-row">
      <span class="trust-item">🔒 SSL Şifreli</span>
      <span class="trust-item">🏦 iyzico Güvencesi</span>
      <span class="trust-item">💳 Taksit İmkânı</span>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const formContent = sessionStorage.getItem('iyziFormContent')

      if (!formContent) {
        document.getElementById('loadingBox').style.display = 'none'
        document.getElementById('errorBox').style.display = 'block'
        return
      }

      // sessionStorage'ı temizle
      sessionStorage.removeItem('iyziFormContent')
      sessionStorage.removeItem('iyziToken')

      const container = document.getElementById('checkoutContainer')
      document.getElementById('loadingBox').style.display = 'none'

      // Form HTML'ini enjekte et
      container.innerHTML = formContent

      // Script'leri sırayla çalıştır
      const scripts = container.querySelectorAll('script')
      const executeScripts = (scripts, index) => {
        if (index >= scripts.length) return
        const s = scripts[index]
        const ns = document.createElement('script')
        if (s.src) {
          ns.src = s.src
          ns.onload = () => executeScripts(scripts, index + 1)
          ns.onerror = () => executeScripts(scripts, index + 1)
        } else {
          ns.textContent = s.textContent
        }
        document.body.appendChild(ns)
        if (!s.src) executeScripts(scripts, index + 1)
      }
      executeScripts(scripts, 0)
    })
  </script>
</body>
</html>
